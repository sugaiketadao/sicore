# Web server config.
# TODO: Set appropriate values for your project.

# Port number to listen on
port.no=8000
# Maximum waiting processes count (TCP queue pending count)
waiting.processes.count=20
# Parallel execution processes count
parallel.processes.count=10
# Server stop context path
server.stop.context=_server_stop

# Static file context path
static.file.context=pages

# JSON service context path
json.service.context=services
# JSON service root package
json.service.package=com.example.app.service

# Sign-in service context path
signin.service.context=signin
# LDAP settings
ldap.enabled=false
# TODO: Update ldap.url and ldap.user.dn.fmt to match your actual LDAP server settings.
ldap.url=ldap://localhost:389
ldap.user.dn.fmt=uid=%s,ou=users,dc=example,dc=com
# JWT signing secret key
# TODO: Change jwt.secret.key to a strong, random secret string.
jwt.secret.key=change-me-to-a-strong-random-secret
# JWT expiration period (seconds)
jwt.expire.sec=86400
